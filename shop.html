<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All - NextEra Fashion</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- Header -->
    <header id="header"></header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <!-- Breadcrumb -->
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <span>/</span>
                <span>Shop</span>
            </div>

            <h1 class="section-title">All Products</h1>

            <!-- Filters -->
            <div class="filter-section">
                <div class="filter-group">
                    <label class="filter-label">Category</label>
                    <div class="filter-options">
                        <button class="filter-option active" data-category="all">All</button>
                        <button class="filter-option" data-category="men">Men</button>
                        <button class="filter-option" data-category="women">Women</button>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Sort By</label>
                    <div class="filter-options">
                        <button class="filter-option active" data-sort="featured">Featured</button>
                        <button class="filter-option" data-sort="price-low">Price: Low to High</button>
                        <button class="filter-option" data-sort="price-high">Price: High to Low</button>
                        <button class="filter-option" data-sort="name">Name: A-Z</button>
                    </div>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="products-grid" class="products-grid"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="drawer">
        <div class="drawer-overlay"></div>
        <div class="drawer-content">
            <div class="drawer-header">
                <h3>Shopping Cart</h3>
                <button class="drawer-close">&times;</button>
            </div>
            <div class="drawer-body" id="cart-items"></div>
            <div class="drawer-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-amount">$0.00</span>
                </div>
                <a href="checkout.html" class="btn btn-primary btn-block">Checkout</a>
            </div>
        </div>
    </div>

    <!-- Wishlist Drawer -->
    <div id="wishlist-drawer" class="drawer">
        <div class="drawer-overlay"></div>
        <div class="drawer-content">
            <div class="drawer-header">
                <h3>Wishlist</h3>
                <button class="drawer-close">&times;</button>
            </div>
            <div class="drawer-body" id="wishlist-items"></div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Search Products</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="search-input" class="search-input" placeholder="Search for products...">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/components.js"></script>
    <script>
        // Shop page specific functionality
        let currentCategory = 'all';
        let currentSort = 'featured';

        function loadProducts() {
            let productsToShow = getProductsByCategory(currentCategory);

            // Apply sorting
            switch(currentSort) {
                case 'price-low':
                    productsToShow.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    productsToShow.sort((a, b) => b.price - a.price);
                    break;
                case 'name':
                    productsToShow.sort((a, b) => a.name.localeCompare(b.name));
                    break;
            }

            renderProducts(productsToShow, 'products-grid');
        }

        // Filter event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Category filters
            document.querySelectorAll('[data-category]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    loadProducts();
                });
            });

            // Sort filters
            document.querySelectorAll('[data-sort]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSort = btn.dataset.sort;
                    loadProducts();
                });
            });

            // Initial load
            loadProducts();
        });
    </script>
</body>
</html>
